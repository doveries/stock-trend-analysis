name: 股票技术分析日报

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 北京时间20:00 = UTC 12:00
  workflow_dispatch:
    inputs:
      extra_tickers:
        description: '额外分析的股票代码（空格分隔）'
        required: false
        default: ''

permissions:
  contents: write   # 允许workflow提交history.json

jobs:
  analyze-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装中文字体
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fonts-wqy-microhei fonts-wqy-zenhei
          fc-cache -f -v

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行分析并发送邮件
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXTRA_TICKERS: ${{ github.event.inputs.extra_tickers }}
        run: python main.py

      - name: 提交历史档案
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f history.json ]; then
            git add history.json
            git diff --staged --quiet || git commit -m "chore: 更新历史档案 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: 上传图表（调试用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charts-${{ github.run_number }}
          path: /tmp/charts/
          retention-days: 3
